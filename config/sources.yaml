# ─── RSS / News Feeds ────────────────────────────────────────────────────────

rss:
  lookback_hours: 48
  max_items_per_feed: 10
  request_timeout: 10      # seconds per feed request

  feeds:
    # ── Independientes ──────────────────────────────────────────────────────
    - name: "14ymedio"
      url: "https://www.14ymedio.com/rss/"
      tier: "independiente"
      weight: 1.0
      enabled: true
      description: "Periódico digital fundado por Yoani Sánchez en 2014. Periodismo independiente desde dentro y fuera de Cuba."

    - name: "CiberCuba"
      url: "https://cibercuba.com/rss.xml"
      tier: "independiente"
      weight: 1.0
      enabled: true
      description: "Medio digital independiente fundado en 2015. Noticias, análisis y reportajes sobre Cuba desde España."

    - name: "Diario de Cuba"
      url: "https://diariodecuba.com/feed/"
      tier: "independiente"
      weight: 1.0
      enabled: false         # 403 Forbidden — blocked
      description: "Diario digital independiente con sede en Madrid. Cubre política, derechos humanos y sociedad cubana."

    - name: "Cubanet"
      url: "https://www.cubanet.org/feed/"
      tier: "independiente"
      weight: 1.0
      enabled: true
      description: "ONG de periodismo independiente fundada en 1994. Red de corresponsales dentro y fuera de Cuba."

    - name: "Martí Noticias"
      url: "https://www.martinoticias.com/api/zr-oveqkit"
      tier: "independiente"
      weight: 1.0
      enabled: false         # 404 — covered by YouTube channel instead
      description: "Servicio noticioso de Radio y TV Martí, financiado por el Congreso de EEUU."

    - name: "El Toque"
      url: "https://eltoque.com/feed/"
      tier: "independiente"
      weight: 0.9
      enabled: true
      description: "Medio digital independiente con énfasis en economía, datos y periodismo de soluciones sobre Cuba."

    - name: "ADN Cuba"
      url: "https://adncuba.com/rss.xml"
      tier: "independiente"
      weight: 0.9
      enabled: true          # Confirmed working (may be intermittent)
      description: "Portal de noticias independiente sobre Cuba con amplia cobertura de actualidad nacional e internacional."

    # ── Diáspora ────────────────────────────────────────────────────────────
    - name: "El Nuevo Herald"
      url: "https://www.elnuevoherald.com/noticias/mundo/america-latina/cuba-es/rss"
      tier: "diaspora"
      weight: 0.9
      enabled: false         # Connection timeout — blocked
      description: "Edición en español del Miami Herald. Cubre la comunidad cubana en EEUU y noticias de Cuba."

    # ── Internacional ────────────────────────────────────────────────────────
    - name: "BBC Mundo"
      url: "https://feeds.bbci.co.uk/mundo/america-latina/rss.xml"
      tier: "internacional"
      weight: 0.8
      cuba_filter: true      # Only keep items that mention Cuba
      enabled: true
      description: "Servicio en español de la BBC británica. Cobertura internacional de América Latina."

    - name: "Reuters Cuba"
      url: "https://feeds.reuters.com/reuters/topNews"
      tier: "internacional"
      weight: 0.8
      cuba_filter: true
      enabled: false         # Connection timeout
      description: "Agencia de noticias global Reuters. Cobertura de Cuba desde corresponsales internacionales."

    # ── Estatal (OFF by default — shown only when toggle is ON) ─────────────
    - name: "Granma"
      url: "https://www.granma.cu/feed"
      tier: "estatal"
      weight: 0.0
      enabled: false         # URL confirmada — desactivado por defecto (toggle estatal)
      description: "Órgano oficial del Partido Comunista de Cuba. Medio controlado por el gobierno cubano."
