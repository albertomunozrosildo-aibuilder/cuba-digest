# CUBA DIGEST - Sources Configuration
#
# YouTube channels support multiple identifier formats:
#   channel_id:  UC...  (most reliable - preferred)
#   handle:      @-less handle, e.g. "MartiNoticias"
#   channel_url: full YouTube URL
#
# If no identifier resolves, the channel is skipped gracefully.
# Set enabled: false to explicitly disable a source.
#
# cuba_filter: true  →  only keep items whose title/description mentions Cuba.
#                        Use for international/diaspora sources that cover many topics.

youtube:
  lookback_hours: 48
  max_videos_per_channel: 5

  channels:
    # ── Independientes ───────────────────────────────────────────────────────
