name: Daily Cuba Digest

on:
  schedule:
    # Runs at 08:00 UTC every day (4am ET / 1am PT)
    - cron: '0 8 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Cuba Digest pipeline
        run: python main.py --mode digest

      - name: Copy digest to docs/
        run: |
          mkdir -p docs
          # Copy latest HTML as index.html so GitHub Pages serves it at root
          LATEST=$(ls -t output/digest_*.html | head -1)
          cp "$LATEST" docs/index.html
          # Also keep a dated copy for history
          cp "$LATEST" docs/

      - name: Commit and push
        run: |
          git config user.name "Cuba Digest Bot"
          git config user.email "actions@github.com"
          git add docs/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
